# HTTPS variant (default) — library server behind Caddy with automatic HTTPS.
# Needs a domain pointed at this host. Command: docker compose up -d

services:
  library:
    build: ./local/library
    restart: unless-stopped
    volumes:
      # Your music lives here. Add files (or whole folders = playlists) and
      # they show up in the app. Uploads from the app land here too.
      - ./local/library/music:/music

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - library

volumes:
  caddy-data:
  caddy-config:
