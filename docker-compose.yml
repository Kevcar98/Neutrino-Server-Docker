# HTTPS variant (default) — use with domain + Caddy.
# Command: docker compose up -d

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data

  backend:
    image: 1337kavin/piped:latest
    restart: unless-stopped
    depends_on:
      - postgres
    volumes:
      - ./config.properties:/app/config.properties:ro

  proxy:
    image: 1337kavin/piped-proxy:latest
    restart: unless-stopped

  library:
    build: ./local/library
    restart: unless-stopped
    environment:
      # Server-side playlist imports reach the resolver over the internal Docker
      # network — a container can't reach its own host's public IP (no NAT hairpin).
      RESOLVER_INTERNAL_URL: http://resolver:9000
    depends_on:
      - resolver
    volumes:
      - ./local/library/music:/music

  resolver:
    build: ./local/resolver
    restart: unless-stopped
    environment:
      # Auto-fetch PO tokens from the bgutil sidecar → passes YouTube's bot check
      # with no manual cookie upkeep. (cookies.txt below still works as fallback.)
      POT_PROVIDER_URL: http://bgutil-provider:4416
      # Advanced: if YouTube blocks this server's datacenter IP, route yt-dlp out
      # through a residential IP via a reverse-SSH SOCKS proxy on the host.
      # Uncomment ONLY once that tunnel runs, or every request fails:
      # YTDLP_PROXY: socks5h://host.docker.internal:1080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - bgutil-provider
    volumes:
      - resolver-data:/data
      # Writable so the app can push cookies here (POST /cookies); also holds a
      # manual cookies.txt if you drop one in. See cookies/README.md.
      - ./cookies:/cookies

  # PO-token provider sidecar. Needs host.docker.internal too so it can mint
  # tokens through the tunnel proxy when one is set (see resolver).
  bgutil-provider:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - backend
      - proxy
      - library
      - resolver

volumes:
  db-data:
  caddy-data:
  caddy-config:
  resolver-data:
