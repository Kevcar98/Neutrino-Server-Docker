# Plain HTTP variant — library server on a port, IP only (no domain, no HTTPS).
# Command: docker compose -f docker-compose.http.yml up -d

services:
  library:
    build: ./local/library
    restart: unless-stopped
    ports:
      - "8091:8091"
    volumes:
      # Your music lives here. Add files (or whole folders = playlists) and
      # they show up in the app. Uploads from the app land here too.
      - ./local/library/music:/music
